<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SatelliteLink Pro - Max Detail</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00f2ff;
            --accent: #ff0055;
            --glass: rgba(5, 10, 20, 0.92);
            --border: rgba(0, 242, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body {
            background-color: #020202;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
            z-index: 1000;
        }

        .logo h1 {
            font-size: 1.3rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.5);
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            background: #000;
        }

        .side-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            z-index: 900;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--primary);
            font-size: 0.9rem;
            outline: none;
        }

        .search-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            cursor: pointer;
        }

        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            border-color: var(--primary);
            background: rgba(0, 242, 255, 0.05);
            transform: translateY(-2px);
        }

        .sat-name {
            font-weight: 700;
            color: var(--primary);
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .sat-meta {
            font-size: 0.75rem;
            color: #888;
        }

        .btn-track {
            width: 100%;
            padding: 10px;
            margin-top: 12px;
            border-radius: 6px;
            border: 1px solid var(--primary);
            background: transparent;
            color: var(--primary);
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-track:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px var(--primary);
        }

        .console {
            background: #000;
            border: 1px solid #111;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            height: 140px;
            overflow-y: auto;
            color: #00ff41;
            box-shadow: inset 0 0 10px rgba(0,255,65,0.1);
        }

        .zoom-info {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 1000;
            background: var(--glass);
            padding: 10px 15px;
            border-radius: 30px;
            border: 1px solid var(--border);
            font-size: 0.8rem;
            pointer-events: none;
        }

        @media (max-width: 800px) {
            .main-container { grid-template-columns: 1fr; }
            .side-panel { position: absolute; bottom: 0; width: 100%; height: 320px; border-top: 2px solid var(--border); }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <h1><i class="fas fa-satellite"></i> SAT-VISION MAX</h1>
    </div>
    <div id="connection-status" style="font-size: 0.8rem; color: var(--primary);">
        <i class="fas fa-broadcast-tower"></i> LIVE SATELLITE FEED: ACTIVE
    </div>
</header>

<div class="main-container">
    <div id="map"></div>
    
    <div class="zoom-info">
        <i class="fas fa-expand"></i> Zoom Level: <span id="z-level">13</span> | <span id="view-mode">Satellite Raw</span>
    </div>

    <div class="side-panel">
        <div class="search-box">
            <input type="text" id="location-search" placeholder="Enter House Name / City / Street...">
            <i class="fas fa-crosshairs" onclick="searchLocation()"></i>
        </div>

        <div class="search-box">
            <input type="text" id="sat-search" placeholder="Find Satellite (e.g. Starlink)..." onkeyup="filterSatellites()">
            <i class="fas fa-search"></i>
        </div>

        <h3 style="font-size: 0.8rem; color: #666; letter-spacing: 1px;">ORBITAL SENSORS</h3>
        <div id="sat-list" style="flex: 1; overflow-y: auto; padding-right: 5px;"></div>

        <div class="console" id="log">
            <div>> Initializing Global Satellite Link...</div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // Lokathulla pradhaana satellites
    const satellites = [
        { id: 1, name: "ISS (Space Station)", speed: 0.05, type: 'Manned Lab', lat: 20, lng: 70 },
        { id: 2, name: "Cartosat-2E (ISRO)", speed: 0.008, type: 'Panchromatic Imaging', lat: 12, lng: 77 },
        { id: 3, name: "Sentinel-2A", speed: 0.012, type: 'Multispectral', lat: 45, lng: 10 },
        { id: 4, name: "Starlink-G4", speed: 0.07, type: 'Comms', lat: -10, lng: 40 },
        { id: 5, name: "WorldView-3", speed: 0.01, type: '0.31m Resolution', lat: 0, lng: 0 },
        { id: 6, name: "RISAT-2B (India)", speed: 0.009, type: 'Radar Imaging', lat: 10, lng: 76 }
    ];

    let map, userMarker;
    const markers = {};

    function init() {
        // Ettavum vyakthathayulla "Clarity" tiles upayogikkunnu
        map = L.map('map', { 
            zoomControl: false,
            maxZoom: 19, // Deep zoom level
            minZoom: 3
        }).setView([10.8505, 76.2711], 13);

        // RAW Satellite Imagery
        const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxNativeZoom: 19,
            maxZoom: 19
        }).addTo(map);

        // Clean interface - labels illathe real photo maathram
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // Marker for target location
        const targetIcon = L.divIcon({
            html: '<div style="width: 20px; height: 20px; border: 2px solid #ff0055; border-radius: 50%; box-shadow: 0 0 10px #ff0055;"></div>',
            className: 'target-marker', iconSize: [20, 20]
        });
        userMarker = L.marker([10.8505, 76.2711], { icon: targetIcon }).addTo(map);

        // Satellite icons on map
        satellites.forEach(s => {
            const satIcon = L.divIcon({
                html: '<i class="fas fa-satellite" style="color: #00f2ff; font-size: 18px; filter: drop-shadow(0 0 5px #00f2ff);"></i>',
                className: 'sat-ico', iconSize: [20, 20]
            });
            markers[s.id] = L.marker([s.lat, s.lng], { icon: satIcon }).addTo(map).bindPopup(`<b>${s.name}</b><br>${s.type}`);
        });

        updateSatList(satellites);
        animate();
        
        // Listen for zoom changes
        map.on('zoomend', () => {
            document.getElementById('z-level').innerText = map.getZoom();
            if(map.getZoom() > 17) {
                addLog(`Ultra-High Zoom active. Enhancing imagery...`);
            }
        });

        document.getElementById('location-search').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchLocation();
        });
    }

    async function searchLocation() {
        const query = document.getElementById('location-search').value;
        if (!query) return;

        addLog(`Transmitting coordinates for: ${query}...`);
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
            const data = await response.json();

            if (data.length > 0) {
                const { lat, lon, display_name } = data[0];
                map.flyTo([lat, lon], 18, { duration: 3 }); // Fly directly to house level
                userMarker.setLatLng([lat, lon]);
                addLog(`Uplink established: ${display_name}`);
            } else {
                addLog(`Unable to locate target. Verify name.`);
            }
        } catch (error) {
            addLog(`Uplink error. Check connection.`);
        }
    }

    function filterSatellites() {
        const term = document.getElementById('sat-search').value.toLowerCase();
        const filtered = satellites.filter(s => s.name.toLowerCase().includes(term));
        updateSatList(filtered);
    }

    function updateSatList(listArray) {
        const list = document.getElementById('sat-list');
        list.innerHTML = listArray.map(s => `
            <div class="card" style="margin-bottom: 10px;">
                <div class="sat-name"><span>${s.name}</span> <i class="fas fa-signal"></i></div>
                <div class="sat-meta">${s.type}</div>
                <button class="btn-track" onclick="focusSat(${s.id})">Lock Sensor</button>
            </div>
        `).join('');
    }

    window.focusSat = (id) => {
        const s = satellites.find(x => x.id === id);
        map.flyTo([s.lat, s.lng], 9);
        markers[id].openPopup();
        addLog(`Tracking ${s.name} orbital path...`);
    };

    function addLog(msg) {
        const log = document.getElementById('log');
        const d = document.createElement('div');
        d.innerHTML = `> ${msg}`;
        log.prepend(d);
    }

    function animate() {
        satellites.forEach(s => {
            s.lng += s.speed;
            if (s.lng > 180) s.lng = -180;
            markers[s.id].setLatLng([s.lat, s.lng]);
        });
        requestAnimationFrame(animate);
    }

    window.onload = init;
</script>

</body>
</html>
