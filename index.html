<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rayhan Valley - Global Satellite Tracker | 1000+ Satellites</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet Extra Plugins -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00f2ff;
            --accent: #ff0055;
            --india-orange: #ff9933;
            --india-green: #138808;
            --glass: rgba(5, 10, 20, 0.95);
            --border: rgba(0, 242, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: #020202;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
            z-index: 1000;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo h1 {
            font-size: 1.3rem;
            background: linear-gradient(135deg, var(--primary), var(--india-orange));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }

        .logo p {
            font-size: 0.7rem;
            color: #888;
        }

        .status-badge {
            background: rgba(0, 242, 255, 0.15);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            border: 1px solid var(--border);
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            background: #000;
        }

        .side-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--border);
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            z-index: 900;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--border);
            border-radius: 30px;
            color: var(--primary);
            font-size: 0.85rem;
            outline: none;
            transition: 0.2s;
        }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }

        .search-box i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            cursor: pointer;
        }

        .section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            margin-top: 8px;
            border-left: 2px solid var(--primary);
            padding-left: 10px;
        }

        .sat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .sat-card:hover {
            border-color: var(--primary);
            background: rgba(0, 242, 255, 0.08);
            transform: translateX(3px);
        }

        .sat-name {
            font-weight: 700;
            color: var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .sat-country {
            font-size: 0.65rem;
            background: rgba(255,255,255,0.1);
            padding: 2px 8px;
            border-radius: 20px;
        }

        .sat-meta {
            font-size: 0.7rem;
            color: #aaa;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-track {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            border-radius: 30px;
            border: 1px solid var(--primary);
            background: transparent;
            color: var(--primary);
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-track:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px var(--primary);
        }

        .console {
            background: #03050a;
            border: 1px solid #1a2a3a;
            border-radius: 8px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            height: 130px;
            overflow-y: auto;
            color: #0f0;
            box-shadow: inset 0 0 8px rgba(0,255,0,0.05);
        }

        .console-entry {
            border-bottom: 1px solid #1a3a2a;
            padding: 4px 0;
            font-size: 0.7rem;
        }

        .zoom-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background: var(--glass);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid var(--border);
            font-size: 0.7rem;
            pointer-events: none;
            backdrop-filter: blur(8px);
        }

        .india-badge {
            background: linear-gradient(135deg, var(--india-orange), var(--india-green));
            color: white;
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 0.6rem;
        }

        @media (max-width: 800px) {
            .main-container { grid-template-columns: 1fr; }
            .side-panel { position: absolute; bottom: 0; width: 100%; height: 340px; border-top: 2px solid var(--border); border-left: none; }
            .logo h1 { font-size: 1rem; }
        }

        /* Custom scroll */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <h1><i class="fas fa-satellite-dish"></i> RAYHAN VALLEY SPACE LINK</h1>
        <p>Karanthoor, Kozhikkod | 1000+ Active Satellites</p>
    </div>
    <div class="status-badge">
        <i class="fas fa-broadcast-tower"></i> <span id="live-status">LIVE TRACKING</span> | <span id="sat-count-display">0</span> Sats
    </div>
</header>

<div class="main-container">
    <div id="map"></div>
    
    <div class="zoom-info">
        <i class="fas fa-map-marker-alt"></i> Rayhan Valley, Kozhikkod | Zoom: <span id="z-level">17</span>
    </div>

    <div class="side-panel">
        <div class="search-box">
            <input type="text" id="location-search" placeholder="🔍 വീടിൻ്റെ പേര് / സ്ഥലം തിരയുക..." autocomplete="off">
            <i class="fas fa-location-dot" onclick="searchLocation()"></i>
        </div>

        <div class="search-box">
            <input type="text" id="sat-search" placeholder="🛰️ സാറ്റലൈറ്റ് തിരയുക..." onkeyup="filterSatellites()" autocomplete="off">
            <i class="fas fa-search"></i>
        </div>

        <div class="section-title">
            <i class="fas fa-satellite"></i> GLOBAL SATELLITE DATABASE
        </div>
        <div id="sat-list" style="flex: 1; overflow-y: auto; padding-right: 5px; max-height: 380px;"></div>

        <div class="console" id="log">
            <div class="console-entry">🚀 Rayhan Valley Ground Station Active</div>
            <div class="console-entry">📍 Location: Karanthoor, Kozhikkod (11.2797°N, 75.8625°E)</div>
            <div class="console-entry">🛰️ Loading 1000+ satellites...</div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>
    // ==================== RAYHAN VALLEY GROUND STATION ====================
    const GROUND_STATION = {
        name: "Markaz Rayhan Valley",
        lat: 11.2797,
        lng: 75.8625,
        place: "Karanthoor, Kozhikkod, Kerala"
    };

    // ==================== GENERATE 1000+ SATELLITES ====================
    function generateSatellites() {
        const satList = [];
        const categories = [
            { name: "Starlink", count: 480, country: "USA/SpaceX", orbit: "LEO 550km", type: "Internet", color: "#22c55e", speed: 0.045 },
            { name: "GPS", count: 32, country: "USA", orbit: "MEO 20200km", type: "Navigation", color: "#3b82f6", speed: 0.008 },
            { name: "GLONASS", count: 28, country: "Russia", orbit: "MEO 19100km", type: "Navigation", color: "#ef4444", speed: 0.0075 },
            { name: "Galileo", count: 28, country: "EU", orbit: "MEO 23222km", type: "Navigation", color: "#8b5cf6", speed: 0.0078 },
            { name: "BeiDou", count: 45, country: "China", orbit: "MEO/GEO", type: "Navigation", color: "#f59e0b", speed: 0.006 },
            { name: "IRNSS", count: 8, country: "India 🇮🇳", orbit: "GEO/IGSO", type: "Navigation", color: "#ff9933", speed: 0.004 },
            { name: "GSAT", count: 22, country: "India 🇮🇳", orbit: "GEO", type: "Communication", color: "#ff9933", speed: 0.0035 },
            { name: "Cartosat", count: 8, country: "India 🇮🇳", orbit: "SSO", type: "Earth Observation", color: "#ffaa44", speed: 0.012 },
            { name: "RISAT", count: 5, country: "India 🇮🇳", orbit: "LEO", type: "Radar Imaging", color: "#ffaa44", speed: 0.011 },
            { name: "Iridium", count: 75, country: "USA", orbit: "LEO 780km", type: "Mobile Comms", color: "#a855f7", speed: 0.025 },
            { name: "OneWeb", count: 150, country: "UK", orbit: "LEO 1200km", type: "Internet", color: "#ec489a", speed: 0.038 },
            { name: "Hubble", count: 1, country: "NASA", orbit: "LEO 540km", type: "Telescope", color: "#06b6d4", speed: 0.013 },
            { name: "Landsat", count: 8, country: "NASA", orbit: "SSO", type: "Earth Imaging", color: "#14b8a6", speed: 0.009 },
            { name: "Sentinel", count: 12, country: "ESA", orbit: "SSO", type: "Monitoring", color: "#10b981", speed: 0.0095 },
            { name: "GOES", count: 6, country: "USA", orbit: "GEO", type: "Weather", color: "#f97316", speed: 0.002 },
            { name: "Meteosat", count: 4, country: "EU", orbit: "GEO", type: "Weather", color: "#f97316", speed: 0.002 },
            { name: "Himawari", count: 2, country: "Japan", orbit: "GEO", type: "Weather", color: "#f97316", speed: 0.002 },
            { name: "KOMPSAT", count: 5, country: "Korea", orbit: "LEO", type: "Earth Obs", color: "#84cc16", speed: 0.01 },
            { name: "RADARSAT", count: 3, country: "Canada", orbit: "SSO", type: "Radar", color: "#2dd4bf", speed: 0.009 },
            { name: "Amateur", count: 90, country: "Various", orbit: "LEO", type: "Amateur Radio", color: "#a78bfa", speed: 0.02 },
            { name: "Weather", count: 45, country: "Various", orbit: "LEO/GEO", type: "Meteorology", color: "#f97316", speed: 0.015 },
            { name: "Communication", count: 130, country: "Various", orbit: "GEO", type: "Telecom", color: "#eab308", speed: 0.003 }
        ];
        
        let id = 1;
        categories.forEach(cat => {
            for (let i = 0; i < cat.count; i++) {
                // Random initial positions
                const lat = (Math.random() * 160) - 80;
                const lng = (Math.random() * 360) - 180;
                const speedVar = cat.speed * (0.7 + Math.random() * 0.6);
                
                satList.push({
                    id: id,
                    name: `${cat.name}-${i+1}`,
                    displayName: cat.name === "Starlink" ? `🛰️ ${cat.name}-${i+1}` : `${cat.name}-${i+1}`,
                    country: cat.country,
                    category: cat.name,
                    orbit: cat.orbit,
                    type: cat.type,
                    color: cat.color,
                    lat: lat,
                    lng: lng,
                    speed: speedVar,
                    altitude: cat.orbit.includes("LEO") ? "400-600km" : (cat.orbit.includes("MEO") ? "~20000km" : "~36000km")
                });
                id++;
            }
        });
        
        // Add specific Indian satellites with fixed positions
        const indianSpecials = [
            { name: "🇮🇳 IRNSS-1I (NavIC)", country: "India", orbit: "GEO 36,000km", type: "Navigation", lat: 5.0, lng: 83.0, speed: 0.002 },
            { name: "🇮🇳 GSAT-30", country: "India", orbit: "GEO", type: "Communication", lat: 0.1, lng: 82.5, speed: 0.002 },
            { name: "🇮🇳 Cartosat-3", country: "India", orbit: "SSO 509km", type: "High Resolution", lat: -25.4, lng: 120.3, speed: 0.012 },
            { name: "🇮🇳 RISAT-2B", country: "India", orbit: "LEO 557km", type: "Radar Imaging", lat: 18.2, lng: 95.7, speed: 0.011 },
            { name: "🇮🇳 NISAR", country: "NASA-ISRO", orbit: "SSO 747km", type: "Earth Science", lat: 21.5, lng: 78.9, speed: 0.009 }
        ];
        
        indianSpecials.forEach((sat, idx) => {
            satList.push({
                id: id + idx,
                name: sat.name,
                displayName: sat.name,
                country: sat.country,
                category: "Indian Satellite",
                orbit: sat.orbit,
                type: sat.type,
                color: "#ff9933",
                lat: sat.lat,
                lng: sat.lng,
                speed: sat.speed,
                altitude: sat.orbit
            });
        });
        
        return satList;
    }

    // ==================== INITIALIZE MAP ====================
    let map, userMarker, groundStationMarker;
    let satellites = [];
    let markers = {};
    let animationFrame;
    
    function initMap() {
        // High resolution satellite imagery with max detail
        map = L.map('map', {
            zoomControl: true,
            maxZoom: 20,
            minZoom: 3,
            zoomDelta: 0.5,
            wheelPxPerZoomLevel: 120
        }).setView([GROUND_STATION.lat, GROUND_STATION.lng], 18);
        
        // Ultra High Resolution Satellite Imagery (ESRI World Imagery)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '&copy; ESRI | Max Resolution',
            maxZoom: 20,
            maxNativeZoom: 19
        }).addTo(map);
        
        // Add zoom control
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        
        // Rayhan Valley Ground Station Marker
        const groundIcon = L.divIcon({
            html: '<div style="width: 32px; height: 32px; background: radial-gradient(circle, #ff9933, #ff5500); border-radius: 50%; border: 2px solid white; box-shadow: 0 0 20px #ff9933; display: flex; align-items: center; justify-content: center;"><i class="fas fa-satellite-dish" style="color: white; font-size: 16px;"></i></div>',
            className: 'ground-station',
            iconSize: [32, 32],
            iconAnchor: [16, 16]
        });
        
        groundStationMarker = L.marker([GROUND_STATION.lat, GROUND_STATION.lng], { icon: groundIcon }).addTo(map);
        groundStationMarker.bindPopup(`
            <b>📡 ${GROUND_STATION.name}</b><br>
            📍 ${GROUND_STATION.place}<br>
            🛰️ 1000+ Satellites Tracking<br>
            ⚡ Active Ground Station
        `).openPopup();
        
        // Add coverage circle
        L.circle([GROUND_STATION.lat, GROUND_STATION.lng], {
            color: '#ff9933',
            fillColor: '#ff9933',
            fillOpacity: 0.08,
            radius: 500000,
            weight: 1
        }).addTo(map);
        
        // User location marker for searched places
        const userIcon = L.divIcon({
            html: '<div style="width: 24px; height: 24px; background: #00f2ff; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 15px #00f2ff;"></div>',
            iconSize: [24, 24]
        });
        userMarker = L.marker([GROUND_STATION.lat, GROUND_STATION.lng], { icon: userIcon }).addTo(map);
        
        // Zoom level display
        map.on('zoomend', () => {
            document.getElementById('z-level').innerText = map.getZoom();
            if (map.getZoom() >= 18) {
                addLogToConsole("Ultra-HD Zoom Active | Buildings & Trees visible");
            }
        });
        
        // Generate and add satellites
        satellites = generateSatellites();
        document.getElementById('sat-count-display').innerHTML = satellites.length;
        
        // Create markers for satellites
        satellites.forEach(sat => {
            const satIcon = L.divIcon({
                html: `<div style="width: 14px; height: 14px; background: ${sat.color}; border-radius: 50%; border: 1px solid white; box-shadow: 0 0 8px ${sat.color};"></div>`,
                className: 'sat-marker',
                iconSize: [14, 14]
            });
            markers[sat.id] = L.marker([sat.lat, sat.lng], { icon: satIcon }).addTo(map);
            markers[sat.id].bindPopup(`
                <b>${sat.displayName}</b><br>
                📍 ${sat.country}<br>
                🛰️ ${sat.type}<br>
                📡 ${sat.orbit}<br>
                📍 ${sat.lat.toFixed(2)}°, ${sat.lng.toFixed(2)}°
            `);
        });
        
        updateSatList(satellites);
        startAnimation();
        
        addLogToConsole(`✅ ${satellites.length} satellites loaded successfully`);
        addLogToConsole(`📍 Rayhan Valley Ground Station Active (${GROUND_STATION.lat}°, ${GROUND_STATION.lng}°)`);
    }
    
    // ==================== SATELLITE ANIMATION ====================
    function startAnimation() {
        function animate() {
            satellites.forEach(sat => {
                // Move satellite longitudinally
                sat.lng += sat.speed;
                if (sat.lng > 180) sat.lng = -180;
                if (sat.lng < -180) sat.lng = 180;
                
                // Small latitude variation for realism
                const time = Date.now() / 1000;
                sat.lat += Math.sin(time * 0.001 * sat.speed) * 0.02;
                if (sat.lat > 85) sat.lat = 85;
                if (sat.lat < -85) sat.lat = -85;
                
                // Update marker position
                if (markers[sat.id]) {
                    markers[sat.id].setLatLng([sat.lat, sat.lng]);
                }
            });
            
            animationFrame = requestAnimationFrame(animate);
        }
        
        animate();
    }
    
    // ==================== SEARCH LOCATION ====================
    async function searchLocation() {
        const query = document.getElementById('location-search').value;
        if (!query) return;
        
        addLogToConsole(`🔍 Searching: ${query}...`);
        
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
            const data = await response.json();
            
            if (data.length > 0) {
                const { lat, lon, display_name } = data[0];
                map.flyTo([lat, lon], 19, { duration: 2 });
                userMarker.setLatLng([lat, lon]);
                addLogToConsole(`📍 Found: ${display_name.substring(0, 60)}`);
                userMarker.bindPopup(`<b>📍 ${display_name}</b>`).openPopup();
                setTimeout(() => userMarker.closePopup(), 3000);
            } else {
                addLogToConsole(`❌ Location not found: ${query}`);
            }
        } catch (error) {
            addLogToConsole(`⚠️ Search error. Check connection.`);
        }
    }
    
    // ==================== FILTER SATELLITES ====================
    function filterSatellites() {
        const term = document.getElementById('sat-search').value.toLowerCase();
        const filtered = satellites.filter(s => 
            s.displayName.toLowerCase().includes(term) || 
            s.country.toLowerCase().includes(term) ||
            s.type.toLowerCase().includes(term) ||
            s.category.toLowerCase().includes(term)
        );
        updateSatList(filtered);
    }
    
    // ==================== UPDATE SATELLITE LIST UI ====================
    function updateSatList(listArray) {
        const container = document.getElementById('sat-list');
        const displayCount = Math.min(listArray.length, 150); // Show top 150 for performance
        
        if (listArray.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:20px; color:#666;">No satellites found</div>';
            return;
        }
        
        let html = '';
        for (let i = 0; i < displayCount; i++) {
            const s = listArray[i];
            const isIndian = s.country.includes('India');
            html += `
                <div class="sat-card" onclick="focusSatellite(${s.id})">
                    <div class="sat-name">
                        <span><i class="fas fa-satellite" style="color: ${s.color};"></i> ${s.displayName}</span>
                        ${isIndian ? '<span class="india-badge">🇮🇳 India</span>' : '<span class="sat-country">' + s.country.split(' ')[0] + '</span>'}
                    </div>
                    <div class="sat-meta">
                        <span>${s.type}</span>
                        <span>${s.orbit}</span>
                    </div>
                    <button class="btn-track" onclick="event.stopPropagation(); focusSatellite(${s.id})">
                        <i class="fas fa-crosshairs"></i> Track Satellite
                    </button>
                </div>
            `;
        }
        
        if (listArray.length > displayCount) {
            html += `<div style="text-align:center; padding:12px; color: var(--primary); font-size:0.7rem;">
                + ${listArray.length - displayCount} more satellites available
            </div>`;
        }
        
        container.innerHTML = html;
    }
    
    // ==================== FOCUS ON SATELLITE ====================
    window.focusSatellite = (id) => {
        const sat = satellites.find(s => s.id === id);
        if (sat && map) {
            map.flyTo([sat.lat, sat.lng], 7, { duration: 1.5 });
            if (markers[sat.id]) {
                markers[sat.id].openPopup();
                setTimeout(() => markers[sat.id].closePopup(), 3000);
            }
            addLogToConsole(`🎯 Tracking: ${sat.displayName} (${sat.type})`);
        }
    };
    
    // ==================== CONSOLE LOG ====================
    function addLogToConsole(msg) {
        const logDiv = document.getElementById('log');
        const entry = document.createElement('div');
        entry.className = 'console-entry';
        entry.innerHTML = `<i class="fas fa-angle-right"></i> ${new Date().toLocaleTimeString()} - ${msg}`;
        logDiv.prepend(entry);
        if (logDiv.children.length > 12) {
            logDiv.removeChild(logDiv.lastChild);
        }
    }
    
    // Make functions global
    window.searchLocation = searchLocation;
    window.filterSatellites = filterSatellites;
    window.focusSatellite = focusSatellite;
    
    // Initialize on load
    window.onload = () => {
        initMap();
        addLogToConsole("🌍 Global Satellite Network Connected");
        addLogToConsole("🏠 High-res satellite imagery active - Buildings & Trees visible");
    };
</script>
</body>
</html>
